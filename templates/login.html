<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:Arial;
background:#ecf0f1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 3px 15px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#219150;
}

</style>

</head>

<body>

<div class="card">

<h2>Login</h2>

<form method="POST" action="/login/">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
