<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

body{
font-family:Arial;
background:#ecf0f1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 3px 15px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

a{
display:block;
margin-top:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<a href="/login">Already have an account?</a>

</div>

</body>
</html>
